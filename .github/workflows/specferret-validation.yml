name: SpecFerret Validation (bmad)

on:
  workflow_dispatch:
    inputs:
      ferret_version:
        description: 'Version of @specferret/cli to validate against'
        default: '0.1.4'
        required: false

jobs:
  scenario-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - id: main
            ref: main
          - id: breaking-required-field
            ref: scenario/breaking-required-field
          - id: breaking-type-change
            ref: scenario/breaking-type-change
          - id: nonbreaking-optional-add
            ref: scenario/nonbreaking-optional-add
          - id: transitive-impact-depth
            ref: scenario/transitive-impact-depth
          - id: review-resolution-flow
            ref: scenario/review-resolution-flow
          - id: code-first-extract
            ref: scenario/code-first-extract
          - id: specferret-opinionated-layout
            ref: scenario/specferret-opinionated-layout
          - id: agent-mode-init
            ref: scenario/agent-mode-init
          - id: breaking-required-field-added
            ref: scenario/breaking-required-field-added
          - id: noop-no-drift
            ref: scenario/noop-no-drift
          - id: depth-3-chain
            ref: scenario/depth-3-chain
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.scenario.ref }}
      - uses: oven-sh/setup-bun@v2
      - name: Install @specferret/cli from npm
        run: bun add --global @specferret/cli@${{ inputs.ferret_version }}
      - name: Prepare baseline
        run: |
          if [ -f scripts/scenario-init.sh ]; then
            chmod +x scripts/scenario-init.sh
            ./scripts/scenario-init.sh
          else
            ferret init --no-hook
          fi
      - name: Assert scenario
        run: chmod +x scripts/assert-scenario.sh; ./scripts/assert-scenario.sh SCENARIO-MANIFEST.json ferret
      - name: Upload scenario artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-ci-${{ matrix.scenario.id }}
          path: artifacts/lint-ci.json
